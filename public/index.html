	</head>
	<body>
		<div id="root"></div>
		<div id="bqtjye" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden">
			<h1 id="asdbwy">LinguaPath Lessons</h1>
			<button id="sabyrl">Start a Lesson</button>
			<p id="figjhs">Language Learning for Every Level</p>
		</div>
		<div style="display:none" aria-hidden="true">
			<h1>LinguaPath — Learn a New Language One Conversation at a Time</h1>
		</div>

		<!-- Constellation background -->
		<canvas id="constellation-canvas"></canvas>

		<div class="main-wrapper">
			<h1 class="site-title" data-text="Areoy Proxy">Kamsi Obierika Proxy</h1>
			<form id="sj-form" class="search-wrapper">
				<input id="sj-search-engine" value="https://duckduckgo.com/?q=%s" type="hidden" />
				<input id="sj-address" type="text" placeholder="search..." autocomplete="off" />
			</form>
			<div class="error-wrapper">
				<p id="sj-error"></p>
				<pre id="sj-error-code"></pre>
			</div>
			<div class="quick-apps">
				<div class="quick-apps-header">
					<span class="quick-apps-label">Quick apps</span>
					<button class="edit-btn" id="edit-toggle">Edit</button>
				</div>
				<div class="apps-grid" id="apps-grid"></div>
				<div class="add-form" id="add-form" style="display:none;">

					<div class="add-form-row">

					</div>
					<div class="add-form-actions">
						<button class="cancel-btn" id="add-cancel">Cancel</button>
						<button class="save-btn" id="add-save">Save</button>
					</div>
				</div>
			</div>
		</div>

		<!-- Constellation script -->
		<script>
		(function () {
			var canvas = document.getElementById("constellation-canvas");
			var ctx = canvas.getContext("2d");
			var stars = [];

			function resize() {
				canvas.width = window.innerWidth;
				canvas.height = window.innerHeight;
			}

			function createStars() {
				var W = canvas.width, H = canvas.height;
				var count = Math.floor((W * H) / 6000);
				stars = [];
				for (var i = 0; i < count; i++) {
					var glowing = Math.random() < 0.1;
					var glowColor = Math.random() > 0.4 ? "#75ac2a" : "#4a9c7a";
					stars.push({
						x: Math.random() * W, y: Math.random() * H,
						vx: (Math.random() - 0.5) * 0.12,
						vy: (Math.random() - 0.5) * 0.12,
						radius: glowing ? Math.random() * 2.5 + 2 : Math.random() * 1.5 + 0.3,
						color: glowing ? glowColor : "#ffffff",
						brightness: Math.random() * 0.5 + 0.3,
						glowing: glowing,
						glowRadius: glowing ? Math.random() * 25 + 20 : 0
					});
				}
			}

			function drawStar(s) {
				if (s.glowing) {
					var g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.glowRadius);
					g.addColorStop(0, s.color + "70");
					g.addColorStop(0.3, s.color + "40");
					g.addColorStop(0.6, s.color + "15");
					g.addColorStop(1, "transparent");
					ctx.beginPath(); ctx.arc(s.x, s.y, s.glowRadius, 0, Math.PI * 2);
					ctx.fillStyle = g; ctx.fill();
					var cg = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.radius * 2);
					cg.addColorStop(0, "#ffffff");
					cg.addColorStop(0.5, s.color);
					cg.addColorStop(1, s.color + "80");
					ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
					ctx.fillStyle = cg; ctx.fill();
				} else {
					var alpha = Math.floor(s.brightness * 255).toString(16).padStart(2, "0");
					ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
					ctx.fillStyle = s.color + alpha; ctx.fill();
				}
			}

			function drawConnections() {
				var dist = 100;
				for (var i = 0; i < stars.length; i++) {
					for (var j = i + 1; j < stars.length; j++) {
						var dx = stars[i].x - stars[j].x, dy = stars[i].y - stars[j].y;
						var d = Math.sqrt(dx * dx + dy * dy);
						if (d < dist) {
							var op = (1 - d / dist) * 0.12;
							var isGlow = stars[i].glowing || stars[j].glowing;
							ctx.beginPath();
							ctx.moveTo(stars[i].x, stars[i].y);
							ctx.lineTo(stars[j].x, stars[j].y);
							ctx.strokeStyle = isGlow
								? "rgba(117,172,42," + (op * 1.5) + ")"
								: "rgba(150,150,150," + op + ")";
							ctx.lineWidth = isGlow ? 0.8 : 0.4;
							ctx.stroke();
						}
					}
				}
			}

			function animate() {
				var W = canvas.width, H = canvas.height;
				ctx.clearRect(0, 0, W, H);
				drawConnections();
				for (var i = 0; i < stars.length; i++) {
					var s = stars[i];
					s.x += s.vx; s.y += s.vy;
					if (s.x < -50) s.x = W + 50;
					if (s.x > W + 50) s.x = -50;
					if (s.y < -50) s.y = H + 50;
					if (s.y > H + 50) s.y = -50;
					if (!s.glowing) {
						s.brightness += (Math.random() - 0.5) * 0.015;
						s.brightness = Math.max(0.15, Math.min(0.7, s.brightness));
					}
					drawStar(s);
				}
				requestAnimationFrame(animate);
			}

			resize(); createStars(); animate();
			window.addEventListener("resize", function () { resize(); createStars(); });
		})();
		</script>

		<script src="apps.js"></script>
	</body>
</html>
