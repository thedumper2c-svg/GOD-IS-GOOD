<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
		<title>Areoy Proxy</title>
		<link rel="shortcut icon" content="favicon.webp" />
		<script src="/scram/scramjet.all.js"></script>
		<script src="/baremux/index.js"></script>
		<link rel="stylesheet" href="index.css" />
		<script src="register-sw.js" defer></script>
		<script src="search.js" defer></script>
		<script src="index.js" defer></script>
	</head>
	<body>
		<!-- Floating ambient orbs -->
		<div class="orb orb-1"></div>
		<div class="orb orb-2"></div>
		<div class="orb orb-3"></div>

		<div class="main-wrapper">
			<h1 class="site-title" data-text="Areoy Proxy">Areoy Proxy</h1>

			<form id="sj-form" class="search-wrapper">
				<input id="sj-search-engine" value="https://duckduckgo.com/?q=%s" type="hidden" />
				<input id="sj-address" type="text" placeholder="search..." autocomplete="off" />
			</form>

			<div class="error-wrapper">
				<p id="sj-error"></p>
				<pre id="sj-error-code"></pre>
			</div>

			<div class="quick-apps">
				<div class="quick-apps-header">
					<span class="quick-apps-label">Quick apps</span>
					<button class="edit-btn" id="edit-toggle">Edit</button>
				</div>
				<div class="apps-grid" id="apps-grid"></div>

				<div class="add-form" id="add-form" style="display:none;">
					<div class="add-form-row">
						<label>Name</label>
						<input type="text" id="add-name" placeholder="My App" />
					</div>
					<div class="add-form-row">
						<label>URL</label>
						<input type="text" id="add-url" placeholder="https://example.com" />
					</div>
					<div class="add-form-actions">
						<button class="cancel-btn" id="add-cancel">Cancel</button>
						<button class="save-btn" id="add-save">Save</button>
					</div>
				</div>
			</div>
		</div>

		<script src="apps.js"></script>
	</body>
</html>
